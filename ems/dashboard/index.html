<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Neoaspire EMS</title>
    <!-- Main CSS OF Exam Management System -->
    <link rel="stylesheet" href="/ems/assests/css/main.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ems/assests/images/favicon/favicon.png">
    <!--Toggle navigation menu Humburger -->
    <script src="/ems/assests/js/menu-toggle.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header class="ems-header">

        <div class="ems-header-left">

            <a href="/ems/" class="ems-logo">
                <img src="/ems/assests/images/logo/logo.png" alt="Logo">
                <span>NeoAspire <strong>EMS</strong></span>
            </a>

        
            <nav class="ems-nav" id="emsNav">
                <a href="/ems/dashboard/" class="nav-item active">Dashboard</a>
                <a href="/ems/coming-soon.html" class="nav-item">Syllabus</a>
                <a href="/ems/coming-soon.html" class="nav-item">Blueprint</a>
                <a href="/ems/coming-soon.html" class="nav-item">QP Generator</a>
            </nav>

        </div>

        <div class="ems-header-right">
            <button class="btn-secondary">Help</button>
            <div class="user-badge">Guest</div>
        </div>
          <!-- HAMBURGER -->
            <button class="menu-toggle" id="menuToggle">
                ☰
            </button>

    </header>

    <!-- Main -->
    <main class="ems-main">

        <main class="ems-main">

            <!-- Modules Section -->
            <section class="dashboard-modules">
                <div class="module-card">
                    <h3>Syllabus</h3>
                    <p>Create, manage and update syllabus for all classes.</p>
                    <a href="/ems/coming-soon.html" class="btn-primary">Go to Syllabus</a>
                </div>

                <div class="module-card">
                    <h3>Blueprints</h3>
                    <p>Create and upload blueprints for exams.</p>
                    <a href="/ems/coming-soon.html" class="btn-primary">Go to Blueprints</a>
                </div>

                <div class="module-card">
                    <h3>QP Generator</h3>
                    <p>Auto-generate question papers for exams.</p>
                    <a href="/ems/coming-soon.html" class="btn-primary">Go to QP Generator</a>
                </div>
            </section>

        </main>

    </main>

<!-- HUMBERGER SCRIPT -->
<script>

const menuToggle = document.getElementById("menuToggle");
const emsNav = document.getElementById("emsNav");

menuToggle.addEventListener("click", function(){
    emsNav.classList.toggle("show");
});

</script>

</body>

</html>
