<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus | Neoaspire EMS</title>

    <!-- ===============================
         Main CSS of Exam Management System
         =============================== -->
    <link rel="stylesheet" href="/ems/assets/css/main.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ems/assets/images/favicon/favicon.png">

    <!-- Load html2pdf.js library first -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Main JS of Exam Management System -->
    <script type="module" src="/ems/assets/js/main.js" defer></script>
</head>

<body data-page="syllabus-builder">

    <!-- ===============================
         HEADER
         =============================== -->
    <header class="ems-header">

        <!-- Left section: Logo + Navigation -->
        <div class="ems-header-left">
            <a href="/ems/" class="ems-logo">
                <img src="/ems/assets/images/logo/logo.png" alt="Logo">
                <span>NeoAspire <strong>EMS</strong></span>
            </a>

            <nav class="ems-nav" id="emsNav">
                <a href="/ems/dashboard/" class="nav-item active">Dashboard</a>
                <a href="/ems/coming-soon.html" class="nav-item">Syllabus</a>
                <a href="/ems/coming-soon.html" class="nav-item">Blueprint</a>
                <a href="/ems/coming-soon.html" class="nav-item">QP Generator</a>
            </nav>
        </div>

        <!-- Right section: Help + User Badge -->
        <div class="ems-header-right">
            <button class="btn-secondary">Help</button>
            <div class="user-badge">Guest</div>
        </div>

        <!-- Hamburger Menu for mobile -->
        <button class="menu-toggle" id="menuToggle">☰</button>

    </header>

    <!-- ===============================
         MAIN CONTENT: Syllabus Builder
         =============================== -->
    <main class="ems-main">
        <section class="syllabus-builder">

            <h1>Syllabus Builder</h1>

            <!-- ===============================
                 Syllabus Form
                 =============================== -->
            <form id="syllabusForm">

                <!-- School Name -->
                <div class="form-group">
                    <label for="schoolName">School Name</label>
                    <input type="text" id="schoolName" placeholder="Enter School Name" required>
                </div>

                <!-- School Address -->
                <div class="form-group">
                    <label for="schoolAddress">Address</label>
                    <input type="text" id="schoolAddress" placeholder="Enter School Address" required>
                </div>

                <!-- Academic Session -->
                <div class="form-group">
                    <label for="session">Session</label>
                    <select id="session" required>
                        <option value="">Select Session</option>
                    </select>
                </div>

                <!-- Class Selection (hidden initially) -->
                <div class="form-group u-hidden" id="classGroup">
                    <label for="classSelect">Class</label>
                    <select id="classSelect" required>
                        <option value="">Select Class</option>
                    </select>
                </div>

                <!-- Subjects Selection (hidden initially) -->
                <div class="form-group u-hidden" id="subjectGroup">
                    <label>Subjects</label>
                    <div id="subjectContainer" class="checkbox-group">
                        <!-- Subjects checkboxes will load dynamically -->
                    </div>
                </div>

                <!-- Exam Types Selection (hidden initially) -->
                <div class="form-group u-hidden" id="examTypeGroup">
                    <label>Exam Type</label>
                    <div id="examTypeContainer" class="checkbox-group">
                        <!-- Exam Type checkboxes will load dynamically -->
                    </div>
                </div>

                <!-- Chapters & Tables Input (Dynamic) -->
                <div id="syllabusDetails">
                    <!-- Dynamic input fields per subject & exam will appear here -->
                </div>

                <!-- ===============================
                     Live Syllabus Preview
                     =============================== -->
                <div id="syllabusPreview" class="syllabus-preview u-hidden">
                    <h3>📄 Syllabus Preview</h3>
                    <div id="previewContent">
                        <!-- Live preview content will render here -->
                    </div>
                </div>

                <!-- ===============================
                     PDF Download Button
                     =============================== -->
                <div class="download-wrapper">
                    <button type="button" id="downloadPdf" class="btn-primary">
                        Download PDF
                    </button>
                </div>

            </form>
        </section>
    </main>

</body>
</html>
