<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus | Neoaspire EMS</title>
   
    <!-- Main CSS OF Exam Management System -->
    <link rel="stylesheet" href="/ems/assets/css/main.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ems/assets/images/favicon/favicon.png">
  
    <!-- Main JS OF Exam Management System -->
    <script type="module" src="/ems/assets/js/main.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header class="ems-header">

        <div class="ems-header-left">

            <a href="/ems/" class="ems-logo">
                <img src="/ems/assets/images/logo/logo.png" alt="Logo">
                <span>NeoAspire <strong>EMS</strong></span>
            </a>


            <nav class="ems-nav" id="emsNav">
                <a href="/ems/dashboard/" class="nav-item active">Dashboard</a>
                <a href="/ems/coming-soon.html" class="nav-item">Syllabus</a>
                <a href="/ems/coming-soon.html" class="nav-item">Blueprint</a>
                <a href="/ems/coming-soon.html" class="nav-item">QP Generator</a>
            </nav>

        </div>

        <div class="ems-header-right">
            <button class="btn-secondary">Help</button>
            <div class="user-badge">Guest</div>
        </div>
        <!-- HAMBURGER -->
        <button class="menu-toggle" id="menuToggle">
            ☰
        </button>

    </header>

    <!-- Main Content for Syllabus -->
    <main class="ems-main">
        <section class="syllabus-builder">

            <h1>Syllabus Builder</h1>

            <form id="syllabusForm">

                <div class="form-group">
                    <label for="schoolName">School Name</label>
                    <input type="text" id="schoolName" placeholder="Enter School Name" required>
                </div>

                <div class="form-group">
                    <label for="session">Session</label>
                    <select id="session" required>
                        <option value="">Select Session</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="classSelect">Class</label>
                    <select id="classSelect" required>
                        <option value="">Select Class</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subjectSelect">Subject</label>
                    <select id="subjectSelect" required>
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">
                    Start Building Syllabus
                </button>

            </form>
        </section>

    </main>

</body>


</html>
