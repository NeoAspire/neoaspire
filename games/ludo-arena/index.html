<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo Ludo Arena 🎲</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/ludo.css">

  <!-- Favicon -->
  <link rel="icon" href="./images/LudoArena.jpeg" type="image/png">

  <!-- JS -->
  <script type="module" src="./js/ludo.js" defer></script>
</head>

<body>

  <!-- ================= START SCREEN ================= -->
  <div id="startScreen" class="start-screen">
    <a href="../index.html">
      <h1>🎲 Neo Ludo Arena</h1>
    </a>
    <p>Enter players and start your battle!</p>

    <label>Game Mode:</label>
    <select id="gameMode">
      <option value="1">1 Player (vs Computer)</option>
      <option value="2">2 Players</option>
      <option value="3">3 Players</option>
      <option value="4">4 Players</option>
    </select>


    <div id="playerInputs">
      <input type="text" placeholder="Enter Player 1 Name" id="p1">
      <input type="text" placeholder="Enter Player 2 Name" id="p2">
      <input type="text" placeholder="Enter Player 3 Name" id="p3">
      <input type="text" placeholder="Enter Player 4 Name" id="p4">
    </div>


    <button onclick="startGame()">🚀 Start Game</button>
  </div>

  <!-- ================= GAME AREA ================= -->
  <div id="gameContainer" style="display: none;">

    <!-- TOP BAR -->
    <div class="top-bar">
      <h2>Neo Ludo Arena</h2>
      <button onclick="restartGame()">🔄 Restart</button>
    </div>

    <!-- BOARD -->
    <div id="board"></div>

    <!-- CONTROLS -->
    <div class="controls">

      <!-- Game Status Left -->
      <p id="status">Waiting for player...</p>

    <!-- Dice Display -->
    <div class="dice-container" onclick="rollDice()">
      <div id="diceCube" class="dice-cube">

        <div class="face front">
          <span class="dot center"></span>
        </div>

        <div class="face back">
          <span class="dot tl"></span>
          <span class="dot tr"></span>
          <span class="dot bl"></span>
          <span class="dot br"></span>
          <span class="dot ml"></span>
          <span class="dot mr"></span>
        </div>

        <div class="face right">
          <span class="dot tl"></span>
          <span class="dot tr"></span>
          <span class="dot bl"></span>
          <span class="dot br"></span>

        </div>

        <div class="face left">
          <span class="dot tl"></span>
          <span class="dot center"></span>
          <span class="dot br"></span>
        </div>

        <div class="face top">
          <span class="dot tl"></span>
          <span class="dot tr"></span>
        </div>

        <div class="face bottom">
          <span class="dot tl"></span>
          <span class="dot tr"></span>
          <span class="dot bl"></span>
          <span class="dot br"></span>
          <span class="dot center"></span>
        </div>

      </div>
    </div>

  </div>

</body>

</html>
