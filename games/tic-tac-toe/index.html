<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Neoaspire</title>

    <!-- PWA / THEME -->
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="./manifest.json">

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon-16.png">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png">
    <!-- Android Icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="./images/icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/tic-tac-toe.css">

    <!-- JS -->
    <script type="module" src="./js/tic-tac-toe.js"></script>

</head>

<body data-app="games" data-page="tic-tac-toe">

    <div class="container">
       
        <h1>Tic Tac Toe</h1>

        <!-- iOS Install Banner -->
        <div id="iosInstallBanner">
            <div class="ios-content">
                <span>
                    Install <b>Tic Tac Toe</b><br>
                    Tap <b>Share</b> ⬆️ and select <b>Add to Home Screen</b>
                    for a full-screen app experience.
                </span>
                <button onclick="closeIosBanner()">OK</button>
            </div>
        </div>

        <!-- STATUS DISPLAY -->
        <div id="status" class="gamemode">Select Game Mode</div>

        <!-- MODE SELECTION -->
        <div class="controls">
            <button onclick="selectMode('PVP')">👥 2 Players</button>
            <button onclick="selectMode('PVC')">🤖 vs Computer</button>
        </div>

        <!-- GAME BOARD -->
        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- RESET BUTTON -->
        <div class="controls">
            <button id="soundToggle">🔊 Sound ON</button>
            <button id="resetBtn">🔄 Restart Game</button>
        </div>

        <a href="../index.html" class="btn-back-inline">← Back to Games</a>
        </div>

    </div>
    </div> <!--Container Ends -->

    <!-- POPUP -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <h2 id="popupMessage"></h2>
            <button onclick="closePopup()">Play Again</button>
        

    <!-- SOUND -->
    <audio id="moveSound" preload="auto">
        <source src="./sounds/move.mp3" type="audio/mpeg">
    </audio>

    <audio id="winSound" preload="auto">
        <source src="./sounds/win.mp3" type="audio/mpeg">
    </audio>

    <audio id="drawSound" preload="auto">
        <source src="./sounds/draw.mp3" type="audio/mpeg">
    </audio>
    <!-- Winner Confetti -->
    <div id="confetti-container"></div>
</body>

</html>
