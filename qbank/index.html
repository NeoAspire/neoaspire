<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank | Neoaspire</title>

    <!-- Main CSS of Neoaspire Website -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="./css/qbank.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon/favicon.png">
    <!-- CORE JS -->
    <script type="module" src="../core/js/index.js"></script>
    <!-- Page Specific JS -->
    <script type="module" src="./js/qbank.js">  </script>

</head>

<body data-app="main" data-page="qbank">
    <!-- Header -->
    <header id="header-container">
        <!-- Header content will be loaded here -->
    </header>

    <!-- Main -->
    <main>

        <!-- Hero Section -->
        <section class="hero-qbank">
            <h2>QUESTION BANK</h2>
            <p>Access Question Bank PDFs and Exam Blueprints</p>

            <div class="hero-qbank-actions">
                <a href="./blueprints.html" class="hero-qbank-btn secondary">
                    📘 View CBSE Blueprints
                </a>
            </div>
        </section>

        <!-- Search and Filter Controls -->

        <section class="qbank-controls">

            <!-- Class Filter -->
            <select id="classFilter">
                <option value="all">All Classes</option>
            </select>

            <!-- Subject Filter -->
            <select id="subjectFilter">
                <option value="all">All Subjects</option>
            </select>

            <!-- Search -->
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="🔍 Search subjects or resources...">
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>

            <!-- Reset -->
            <button id="resetAllFilters" class="reset-btn">🔄 Reset</button>

        </section>

        <!-- 🔥 QBank Section JSON WILL RENDER HERE -->
        <section class="qbank-section" id="qbankContainer">
            <!-- Dynamic content from JSON -->
        </section>

    </main>

    <!-- No Results Message -->
    <div id="noResultsModal" class="premium-modal">
        <div class="premium-modal-box">

            <!-- Icon -->
            <div class="modal-icon">🔍</div>

            <!-- Title -->
            <h2>No Results Found</h2>

            <!-- Message -->
            <p>We couldn’t find anything matching your search.</p>

            <!-- Suggestions -->
            <div class="suggestions">
                <span>Try:</span>
                <button class="suggestion-chip">Mathematics</button>
                <button class="suggestion-chip">IT</button>
                <button class="suggestion-chip">Web</button>
            </div>

            <!-- Actions -->
            <div class="modal-actions">
                <button id="resetFilters" class="primary-btn">Reset Filters</button>
                <button id="closeModal" class="secondary-btn">Close</button>
            </div>

        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="payment-modal">
  <div class="modal-content">
    <h3 id="paymentTitle">Complete Payment</h3>
    
    <p id="paymentMessage">Proceed to payment</p>

    <button id="payNowBtn">Pay Now</button>
  </div>
</div>

    <!-- Footer -->
    <footer id="footer-container">
        <!-- Footer content will be loaded here -->
    </footer>

</body>

</html>
