<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout | Neoaspire</title>
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon/favicon.png">
    <!-- Dark Mode Script -->
    <script src="/js/dark-mode.js" defer></script>
</head>

<body>
    <!-- Header -->
    <header id="site-header">
        <!-- Logo and Site Name -->
        <a href="/index.html" class="logo">
            <img src="/images/favicon/logo.png" alt="Site Logo">
            <h1>NeoAspire</h1>
        </a>
        <!--Navbar -->
        <nav class="navbar" aria-label="Main Navigation">
            <button class="nav-hamburger" aria-label="Open Menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/ems/" class="nav-link" data-tooltip="Exam Management System">EMS</a></li>
                <li><a href="/q-bank/" class="nav-link" data-tooltip="Question Bank">Q_Bank</a></li>
                <li><a href="/courses/">Courses</a></li>
                <li><a href="/creatives/">Creatives</a></li>
                <li><a href="/downloads.html">Downloads</a></li>
                <li><a href="/contact-us.html">Contact Us</a></li>
            </ul>

            <button class="dark-mode-button" id="dark-mode-toggle" aria-label="Toggle Dark Mode">
                🌙
            </button>
        </nav>
    </header>

    <!-- Main -->
    <main>
        <!-- Page Content-->

    </main>

    <!-- Footer -->
    <footer id="site-footer">
        <p>© <span id="fiscal-year"></span> Neoaspire. All rights reserved. |
            <a href="/legal/terms-and-conditions.html">Terms & Conditions</a> |
            <a href="/legal/privacy-policy.html">Privacy Policy</a>
        </p>
    </footer>

    <!-- Script to load hamburger -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const hamburger = document.querySelector('.nav-hamburger');
            const navLinks = document.querySelector('.nav-links');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function () {
                    navLinks.classList.toggle('show');
                });
                document.addEventListener('click', function (e) {
                    if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
                        navLinks.classList.remove('show');
                    }
                });
            }
        });
    </script>

    <!-- Script to handle dynamic fiscal year display -->
    <script>
        const startYear = 2025; // Year your project/company started
        const currentYear = new Date().getFullYear();

        // Show only last two digits of current year if different from start year
        const displayYear = (currentYear === startYear)
            ? startYear
            : `${startYear} - ${currentYear.toString().slice(-0)}`;

        document.getElementById("fiscal-year").textContent = displayYear;
    </script>


</body>

</html>
